name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Push backend to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Clone the HF Space repo
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE} hf-space

          # Sync backend files → Space root (exclude dev-only files)
          rsync -av --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='tku.db' \
            --exclude='venv' \
            --exclude='.venv' \
            backend/ hf-space/

          # Commit and push (only if there are changes)
          cd hf-space
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "Deploy from GitHub Actions (${GITHUB_SHA::8})"
            git push
            echo "Deployed successfully."
          fi
